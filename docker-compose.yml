services:
  tech-challenge-api:
    build: .
    container_name: tech-challenge-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - .:/app
      - /app/.venv
      - /app/.venv312
      - /app/__pycache__
      - /app/.pytest_cache
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-exclude '**/.venv*/**'
      --reload-exclude '**/__pycache__/**'
      --reload-exclude '**/tests/**'"
    depends_on:
      tech-challenge-db:
        condition: service_healthy

  tech-challenge-db:
    image: postgres:16-alpine
    container_name: tech-challenge-db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oficina"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
