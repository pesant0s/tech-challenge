name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/tech-challenge

jobs:
  test:
    name: Testes e cobertura
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "sqlite:///./test.db"
      SECRET_KEY: "ci-secret-key-minimo-32-chars-para-testes"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "admin123"
      WEBHOOK_SECRET: "webhook-secret-local"
      ALLOWED_ORIGINS: '["http://localhost:3000"]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar testes com cobertura
        run: |
          python -m pytest --cov=app --cov-report=xml --cov-report=term-missing -q

      - name: Upload cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Validar manifestos Kubernetes (dry-run)
        uses: azure/setup-kubectl@v4

      - name: Instalar Kind e validar manifestos
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x ./kind && sudo mv ./kind /usr/local/bin/kind
          kind create cluster --name validate
          kubectl apply --dry-run=client -f k8s/namespace.yaml
          kubectl apply --dry-run=client -f k8s/postgres/
          kubectl apply --dry-run=client -f k8s/

  deploy-k8s:
    name: Deploy em cluster Kind (K8s)
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar cluster Kind
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: tech-challenge
          wait: 120s

      - name: Build imagem Docker
        run: docker build -t tech-challenge-api:latest .

      - name: Carregar imagem no Kind
        run: kind load docker-image tech-challenge-api:latest --name tech-challenge

      - name: Deploy PostgreSQL
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/postgres/pvc.yaml
          kubectl apply -f k8s/postgres/service.yaml
          kubectl apply -f k8s/postgres/statefulset.yaml
          kubectl rollout status statefulset/postgres -n oficina --timeout=120s

      - name: Deploy aplicação
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl rollout status deployment/tech-challenge-api -n oficina --timeout=120s

      - name: Smoke test — GET /health
        run: |
          kubectl port-forward svc/tech-challenge-svc 8080:8000 -n oficina &
          sleep 15
          curl -f http://localhost:8080/health

      - name: Exibir estado do cluster
        if: always()
        run: |
          kubectl get all -n oficina
          kubectl get hpa -n oficina

  build-and-push:
    name: Build e push GHCR
    needs: deploy-k8s
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
